<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Minimarket</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Judul -->
        <h1>
            <marquee>
                SELAMAT DATANG DI MINIMARKET
            </marquee>
        </h1>

        <!-- Daftar Produk -->
        <div id="product-list">

            <h2>DAFTAR PRODUK</h2>
            <div id="products"
                 class="product-container">
            </div>

        </div>

        <!-- Keranjang -->
        <div id="cart">

            <h2>Keranjang Belanja</h2>

            <!-- HARUS sama dengan JS -->
            <ul id="cart-items"></ul>

            <p>
                Total: Rp
                <span id="total-price">0</span>
            </p>

            <!-- Tombol checkout -->
            <button id="checkout-btn">
                Checkout
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
